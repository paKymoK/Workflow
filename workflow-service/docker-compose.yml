services:
  workflow-service:
    build:
      context: ..
      dockerfile: workflow-service/Dockerfile
    container_name: workflow-service
    ports:
      - "8081:8081"
    environment:
      AUTH_ISSUER_URI: http://192.168.1.16:9000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SCHEMA: workflow
      DB_USER: postgres
      DB_PASSWORD: postgres
      EUREKA_URI: http://discovery-service:8761/eureka
      JWK_URI: http://auth-service:9000/oauth2/jwks
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      DEBEZIUM_OFFSET_PATH: /data/offset.dat
    volumes:
      - workflow-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "500m"
        max-file: "1"
    restart: on-failure

volumes:
  workflow-data:
    name: offset_debezium
    driver: local