eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://127.0.0.1:8761/eureka}
server:
  port: 8080
spring:
  main:
    web-application-type: reactive
  application:
     name: gateway-service
  data:
    redis:
      port: 6379
      host: 127.0.0.1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://127.0.0.1:9000}
  cloud:
    loadbalancer:
      ribbon:
        enabled: false
    gateway:
      server:
        webflux:
          enabled: true
          discovery:
            locator:
              enabled: true
          httpclient:
            connect-timeout: 10000
            response-timeout: 60s
            compression: false
          routes:
            - id: workflow-websocket
              uri: lb:ws://workflow-service
              predicates:
                - Path=/workflow-service/web-socket/**
              filters:
                - RewritePath=/workflow-service/(?<segment>.*), /${segment}
            - id: auth
              uri: lb://auth-service
              predicates:
                - Path=/auth-service/**
              filters:
                - RewritePath=/auth-service/(?<segment>.*), /${segment}
            - id: workflow
              uri: lb://workflow-service
              predicates:
                - Path=/workflow-service/**
              filters:
                - RewritePath=/workflow-service/(?<segment>.*), /${segment}
            - id: media
              uri: lb://media-service
              predicates:
                - Path=/media-service/**
              filters:
                - RewritePath=/media-service/(?<segment>.*), /${segment}
            - id: chatbot
              uri: lb://chat-service
              predicates:
                - Path=/chat-service/**
              filters:
                - RewritePath=/chat-service/(?<segment>.*), /${segment}
            - id: shop
              uri: lb://shop-service
              predicates:
                - Path=/shop-service/**
              filters:
                - RewritePath=/shop-service/(?<segment>.*), /${segment}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: workflow-service
        url: /workflow-service/docs/api-docs
      - name: media-service
        url: /media-service/docs/api-docs
      - name: shop-service
        url: /shop-service/docs/api-docs
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
