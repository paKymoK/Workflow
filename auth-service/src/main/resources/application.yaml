server:
  port: 9000

auth:
  issuer-uri: ${AUTH_ISSUER_URI:http://127.0.0.1:9000}
  internal-domain: ${AUTH_INTERNAL_DOMAIN:mycompany.local}

spring:
  application:
    name: auth-service
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5433}/${DB_SCHEMA:authentication}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthServicePool
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 5000
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: none
    database: postgresql
    show-sql: true
  config:
    import: 'classpath:management.yml'
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://127.0.0.1:8761/eureka}
  instance:
    prefer-ip-address: true

client:
  workflow-service:
    url: ${WORKFLOW_SERVICE:http://127.0.0.1:8080}

ldap:
  url: ldap://localhost:389
  base: dc=mycompany,dc=local
  username: cn=admin,dc=mycompany,dc=local
  password: admin_secret
  user-search-base: ou=users
  user-search-filter: "(cn={0})"
  group-search-base: ou=groups

management:
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    ldap:
      enabled: false

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.springframework.web: ${LOGGING_LEVEL_SPRING_WEB:INFO}
    org.springframework.security: ${LOGGING_LEVEL_SPRING_SECURITY:DEBUG}
    org.springframework.security.oauth2: ${LOGGING_LEVEL_SPRING_OAUTH2:DEBUG}
    org.springframework.security.web.FilterChainProxy: INFO
