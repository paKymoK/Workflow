management:
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  otlp:
    enabled: false
    tracing:
      endpoint: http://localhost:4318/v1/traces
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      access: unrestricted